services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/bho.lt:/var/www/bho.lt
    depends_on:
      - web_api
    restart: always

  redis:
    # Pin to the major version currently deployed (check: docker compose exec redis redis-server --version)
    image: redis:8
    restart: always

  mongodb:
    # Pin to the major version currently deployed (check: docker compose exec mongodb mongod --version).
    # Downgrading a major version against existing data files will fail to start.
    image: mongo:7
    volumes:
      - /opt/botoholt/mongodb:/data/db
    restart: always

  web_api:
    build:
      context: ./web_api
      dockerfile: Dockerfile
    ports:
      - "2999:2999"
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      PORT: 3000
      PORT_SOCK: 2999
    env_file:
      - path: ./web_api/v1/.env
        required: false
    depends_on:
      - redis
      - mongodb
    restart: always

  shazam_api:
    build:
      context: ./shazam_api
      dockerfile: Dockerfile
    env_file:
      - path: ./shazam_api/.env
        required: false
    restart: always

  bholt_twitch:
    build:
      context: ./bot_twitch
      dockerfile: Dockerfile
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      WEB_API_BASE: http://web_api:3000
      SONGS_BACKEND: http://shazam_api:5000/
    env_file:
      - path: ./bot_twitch/bot/.env
        required: false
    depends_on:
      - redis
      - mongodb
      - web_api
    restart: always

  da_api:
    build:
      context: ./da_api
      dockerfile: Dockerfile
    environment:
      MONGO_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      WEB_API_BASE: http://web_api:3000
    env_file:
      - path: ./da_api/app/.env
        required: false
    depends_on:
      - redis
      - mongodb
      - web_api
    restart: always

  chernorabochy:
    build:
      context: ./chernorabochy
      dockerfile: Dockerfile
    environment:
      MONGO_URL: mongodb://mongodb:27017
    env_file:
      - path: ./chernorabochy/media_followers/.env
        required: false
    depends_on:
      - mongodb
    restart: always
