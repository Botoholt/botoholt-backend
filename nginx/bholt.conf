server {
    server_name bho.lt;

    root /var/www/bho.lt;

    # Docker's embedded DNS. Using variables in proxy_pass forces nginx to
    # re-resolve the service name instead of caching the container IP at
    # startup — otherwise recreating web_api breaks the proxy with 502s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
        #error_page 404 /;
    }
    location /api/v1/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # With a variable proxy_pass no longer strips the location prefix,
        # so drop /api/v1/ explicitly before proxying.
        set $web_api_upstream http://web_api:3000;
        rewrite ^/api/v1/(.*)$ /$1 break;
        proxy_pass $web_api_upstream;
    }

    location /api/v1/socket/ {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # Socket.io expects the full /api/v1/socket/ path, so no rewrite here.
        set $web_api_sock_upstream http://web_api:2999;
        proxy_pass $web_api_sock_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/ssl/cert.crt; # managed by Certbot
    ssl_certificate_key /etc/ssl/cert.key; # managed by Certbot
#    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
#    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = bho.lt) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name bho.lt;
    return 404; # managed by Certbot


}


